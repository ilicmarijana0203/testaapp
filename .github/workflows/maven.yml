name: Java CI with Maven + Auto Translate PR

on:
  push:
    branches: [main, develop, '**']
    paths:
      - '**/en.json'
      - '**/messages_en.properties'
      - '**/i18n.ts'
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # važno da možemo checkout develop

      # 2️⃣ Configure git
      - name: Configure git
        run: |
          git config user.name "translation-bot"
          git config user.email "bot@company.com"

      # 3️⃣ Checkout develop branch (osnova za feature branch)
      - name: Checkout develop
        run: |
          git fetch origin develop
          git checkout develop

      # 4️⃣ Create new feature branch
      - name: Create feature branch
        id: vars
        run: |
          BRANCH_NAME="feature/auto-translations-${{ github.run_number }}"
          git checkout -b $BRANCH_NAME
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

      # 5️⃣ Auto translate .properties (TH) using DeepL + bash
      - name: Auto translate missing keys
        env:
          DEEPL_KEY: ${{ secrets.DEEPL_KEY }}
        run: |
          INPUT_FILE="src/main/resources/messages_en.properties"
          TARGET_LANGS=("TH")  # možeš dodati i više jezika

          for LANG in "${TARGET_LANGS[@]}"; do
            OUT_FILE="src/main/resources/messages_${LANG,,}.properties"
            touch $OUT_FILE
          done

          while IFS='=' read -r KEY VAL; do
            for LANG in "${TARGET_LANGS[@]}"; do
              OUT_FILE="src/main/resources/messages_${LANG,,}.properties"
              if ! grep -q "^${KEY}=" "$OUT_FILE"; then
                TRANSLATED=$(curl -s -X POST "https://api-free.deepl.com/v2/translate" \
                  -H "Authorization: DeepL-Auth-Key $DEEPL_KEY" \
                  -H "Content-Type: application/x-www-form-urlencoded" \
                  -d "text=$VAL" \
                  -d "target_lang=$LANG" | jq -r '.translations[0].text')
                echo "${KEY}=${TRANSLATED}" >> "$OUT_FILE"
              fi
            done
          done < "$INPUT_FILE"

      # 6️⃣ Commit translations
      - name: Commit translations
        run: |
          git add .
          git diff-index --quiet HEAD || git commit -m "Auto translated via DeepL"

      # 7️⃣ Push new feature branch
      - name: Push feature branch
        uses: ad-m/github-push-action@v0.6.0
        with:
          branch: ${{ env.BRANCH_NAME }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # 8️⃣ Create PR to develop
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ env.BRANCH_NAME }}
          base: develop
          title: "Auto translated via DeepL"
          body: "This PR adds missing translations generated automatically using DeepL API."

      # 9️⃣ Original Maven steps
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Update dependency graph
        uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6

      - name: Build and publish Docker Image
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: makica/testapp:latest

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST }}
        run: |
          mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.projectKey=ilicmarijana0203_testaapp \
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.branch.name=${{ github.ref_name }}