name: Auto Translate via DeepL and PR

on:
  push:
    branches: [main, develop]
    paths:
      - '**/en.json'
      - '**/messages_en.properties'
      - '**/i18n.ts'

permissions:
  contents: write

jobs:
  translate-pr:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 1️⃣ Configure git
      - name: Configure git
        run: |
          git config user.name "marijana"
          git config user.email "majazmaja2003@gmail.com"

      # 2️⃣ Auto-translate using bash + curl
      - name: Auto translate missing keys
        env:
          DEEPL_KEY: ${{ secrets.DEEPL_KEY }}
        run: |
          # Example for properties file
          INPUT_FILE="src/main/resources/messages_en.properties"
          TARGET_LANGS=("TH" "ZH" "KO" "JA" "ID" "ES" "PT")

          while IFS='=' read -r KEY VAL
          do
            for LANG in "${TARGET_LANGS[@]}"
            do
              OUT_FILE="src/main/resources/messages_${LANG,,}.properties"
              # Skip if translation already exists
              if ! grep -q "^${KEY}=" "$OUT_FILE" 2>/dev/null; then
                TRANSLATED=$(curl -s -X POST "https://api-free.deepl.com/v2/translate" \
                  -H "Authorization: DeepL-Auth-Key $DEEPL_KEY" \
                  -H "Content-Type: application/x-www-form-urlencoded" \
                  -d "text=$VAL" \
                  -d "target_lang=$LANG" | jq -r '.translations[0].text')
                echo "${KEY}=${TRANSLATED}" >> "$OUT_FILE"
              fi
            done
          done < "$INPUT_FILE"

      # 3️⃣ Create branch for translations
      - name: Create branch
        id: vars
        run: |
          BRANCH_NAME="auto-translations-${{ github.run_number }}"
          git checkout -b $BRANCH_NAME
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

      # 4️⃣ Commit changes
      - name: Commit translations
        run: |
          git add .
          git diff-index --quiet HEAD || git commit -m "Auto translated via DeepL"

      # 5️⃣ Push branch
      - name: Push branch
        uses: ad-m/github-push-action@v0.6.0
        with:
          branch: ${{ env.BRANCH_NAME }}
          github_token: ${{ secrets.TOKEN_GIT }}

      # 6️⃣ Create Pull Request
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.TOKEN_GIT }}
          branch: ${{ env.BRANCH_NAME }}
          base: develop
          title: "Auto translated via DeepL"
          body: "This PR adds missing translations generated automatically using DeepL API."